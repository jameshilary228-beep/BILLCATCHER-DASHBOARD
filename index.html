<!DOCTYPE html>
<html>
<head>

<title>BillCatcher</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>BillCatcher Cloud Cost Dashboard</h1>
<p class="description">
Monitor and control your cloud spending in real time. Set budgets, track usage, and receive alerts before costs exceed your limit.
</p>

<section>

<h2>Set Budget</h2>

<input id="budgetInput" type="number" placeholder="Enter monthly budget">

<button onclick="setBudget()">Save Budget</button>

<p id="budgetDisplay">Budget: Not set</p>

</section>


<section>

<h2>Add Cloud Spend</h2>

<input id="spendInput" type="number" placeholder="Enter spend">

<button onclick="addSpend()">Add Spend</button>

</section>


<section>

<h2>Current Spend</h2>

<h3 id="totalSpend">$0</h3>

<p id="weeklySpend">Weekly Spend: $0</p>

</section>


<section>

<h2>Alerts</h2>

<div id="alertBox"></div>

</section>


<section>

<h2>Spend History</h2>

<ul id="history"></ul>

</section>


<script src="app.js"></script>

</body>
</html>
