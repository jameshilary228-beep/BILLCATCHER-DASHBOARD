<div style="text-align:center; margin-bottom:30px;">
  <h2>BillCatcher</h2>
  <p>Stop Cloud Bills Before They Explode</p>
  <p>Track Azure, AWS and Google Cloud spending in one place.</p>
</div>                         <!DOCTYPE html>
<html>
<head>
<title>BillCatcher Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

input,button,select{
padding:10px;
border-radius:6px;
border:none;
margin-top:10px;
}

button{
background:#2563eb;
color:white;
}

#spend{
font-size:32px;
color:#22c55e;
}

</style>
</head>

<body>

<h1>BillCatcher Dashboard</h1>

<div class="card">

<label>Cloud Provider</label>
<select>
<option>Microsoft Azure</option>
<option>AWS</option>
<option>Google Cloud</option>
</select>

<br>

<label>Monthly Budget</label><br>

<input id="budgetInput" type="number" placeholder="Enter budget">

<button onclick="setBudget()">Set Budget</button>

</div>


<div class="card">

<h3>Weekly Cloud Spend</h3>

<canvas id="spendChart"></canvas>

</div>


<div class="card">

<h3>Current Cloud Spend</h3>

<p id="spend">$0</p>

<p id="budgetStatus">You are within budget</p>

</div>

<script src="app.js"></script>

</body>
</html>
